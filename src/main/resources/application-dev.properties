# Development Profile Configuration
spring.profiles.active=dev

# Database Configuration (H2 for development)
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true

# JWT Configuration (Development - shorter expiration for testing)
app.jwt.secret=devSecretKeyForJWTTokenGenerationThatShouldBeLongEnoughForDevelopment
app.jwt.expiration=3600000  # 1 hour
app.jwt.refresh-expiration=86400000  # 24 hours

# Swagger/OpenAPI Configuration (enabled in dev)
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true

# Logging Configuration (verbose in development)
logging.level.org.averdev.basepeoject=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.springframework.web=DEBUG

# CORS Configuration (permissive in development)
spring.web.cors.allowed-origins=http://localhost:3000,http://localhost:4200,http://localhost:8080
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true

# Actuator Configuration (more endpoints in dev)
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
