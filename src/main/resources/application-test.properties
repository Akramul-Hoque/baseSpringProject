# Test Profile Configuration
spring.profiles.active=test

# Database Configuration (H2 for testing)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.h2.console.enabled=false

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.defer-datasource-initialization=true

# JWT Configuration (Test - very short expiration)
app.jwt.secret=testSecretKeyForJWTTokenGenerationThatShouldBeLongEnoughForTesting
app.jwt.expiration=60000  # 1 minute
app.jwt.refresh-expiration=300000  # 5 minutes

# Swagger/OpenAPI Configuration (disabled in test)
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

# Logging Configuration (minimal in test)
logging.level.org.averdev.basepeoject=WARN
logging.level.org.springframework.security=WARN
logging.level.org.hibernate=WARN
logging.level.org.springframework.web=WARN

# CORS Configuration (restricted in test)
spring.web.cors.allowed-origins=http://localhost:3000
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true

# Actuator Configuration (limited in test)
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

# Test-specific settings
spring.test.database.replace=none
spring.jpa.properties.hibernate.jdbc.batch_size=20
