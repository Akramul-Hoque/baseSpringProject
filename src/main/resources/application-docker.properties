# Docker Profile Configuration
spring.profiles.active=docker

# Database Configuration (MySQL for Docker)
spring.datasource.url=jdbc:mysql://mysql:3306/baseproject
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=rootpassword
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# JWT Configuration (Docker - secure settings)
app.jwt.secret=dockerSecretKeyForJWTTokenGenerationThatShouldBeLongEnoughAndSecure
app.jwt.expiration=3600000  # 1 hour
app.jwt.refresh-expiration=604800000  # 7 days

# Swagger/OpenAPI Configuration (disabled in Docker)
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

# Logging Configuration (Docker)
logging.level.org.averdev.basepeoject=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate=WARN
logging.level.org.springframework.web=WARN

# CORS Configuration (Docker)
spring.web.cors.allowed-origins=http://localhost,http://localhost:8080
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true

# Actuator Configuration (Docker)
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.endpoint.health.roles=ADMIN

# Redis Configuration (Docker)
spring.cache.type=redis
spring.redis.host=redis
spring.redis.port=6379
spring.redis.timeout=2000ms
spring.redis.lettuce.pool.max-active=8
spring.redis.lettuce.pool.max-idle=8
spring.redis.lettuce.pool.min-idle=0

# Server Configuration
server.port=8080
server.tomcat.max-threads=200
server.tomcat.connection-timeout=20000
